name: Обновление расписания

on:
  schedule:
    # Каждые 45 минут, Пн-Сб, 6:00-22:00 МСК (UTC+3 → UTC 3:00-19:00)
    - cron: '0,45 3-19 * * 1-6'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  parse:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Получить код
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Установить Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Установить зависимости
        run: pip install selenium webdriver-manager

      - name: Установить Chrome и ChromeDriver
        run: |
          wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y ./google-chrome-stable_current_amd64.deb
          echo "Chrome: $(google-chrome --version)"
          # ChromeDriver совместимой версии
          pip install chromedriver-autoinstall
          python -c "import chromedriver_autoinstall; chromedriver_autoinstall.install()"
          chromedriver --version || true

      - name: Запустить парсер
        env:
          CI: "true"
          CHRT_LOGIN:    ${{ secrets.CHRT_LOGIN }}
          CHRT_PASSWORD: ${{ secrets.CHRT_PASSWORD }}
        run: python login_script.py

      - name: Сохранить schedule.json в репозиторий
        run: |
          git config user.name  "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add schedule.json
          git diff --staged --quiet || \
            git commit -m "⏰ Расписание: $(TZ='Asia/Yekaterinburg' date +'%d.%m.%Y %H:%M')"
          git push
