name: Обновление расписания

on:
  schedule:
    - cron: '0,45 3-19 * * 1-6'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  parse:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Получить код
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Установить Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Установить Playwright
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Запустить парсер
        env:
          CI: "true"
          CHRT_LOGIN:    ${{ secrets.CHRT_LOGIN }}
          CHRT_PASSWORD: ${{ secrets.CHRT_PASSWORD }}
        run: python login_script.py

      - name: Сохранить schedule.json
        run: |
          git config user.name  "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add schedule.json
          git diff --staged --quiet || \
            git commit -m "⏰ Расписание: $(TZ='Asia/Yekaterinburg' date +'%d.%m.%Y %H:%M')"
          git push
