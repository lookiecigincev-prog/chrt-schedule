<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Расписание ЧРТ</title>
<meta name="description" content="Расписание занятий Челябинского радиотехнического техникума">
<meta name="theme-color" content="#0a1628">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Расписание ЧРТ">
<link rel="manifest" href="./manifest.json">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900;1000&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --blue:    #1565C0;
  --blue2:   #1E88E5;
  --blue3:   #42A5F5;
  --red:     #E53935;
  --dark:    #0D1B2A;
  --card:    #FFFFFF;
  --bg:      #EEF4FB;
  --border:  rgba(21,101,192,0.12);
  --text:    #0D1B2A;
  --text2:   #4A6080;
  --text3:   #8FA4BE;
  --r:       14px;
  --sh:      0 4px 20px rgba(21,101,192,0.10);
  --sh2:     0 8px 32px rgba(21,101,192,0.18);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html, body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ══ ШАПКА ════════════════════════════════════════════════════ */
.header {
  position: sticky; top: 0; z-index: 100;
  background: linear-gradient(160deg, #0a1628 0%, #102244 50%, #163060 100%);
  padding: 0;
  box-shadow: 0 4px 24px rgba(0,0,0,0.35);
  overflow: hidden;
}

/* Декоративная волна */
.header-wave {
  position: absolute; bottom: -1px; left: 0; right: 0;
  height: 18px; overflow: hidden; line-height: 0;
}
.header-wave svg { display: block; width: 100%; height: 18px; }

.header-inner {
  position: relative; z-index: 2;
  padding: 14px 16px 28px;
}

.header-top {
  display: flex; align-items: center; gap: 0; margin-bottom: 16px;
  min-height: 64px;
}

.header-text { flex: 1; min-width: 0; }
.header-title {
  font-family: 'Montserrat', sans-serif;
  font-size: 18px; font-weight: 900; color: white;
  letter-spacing: -0.3px; line-height: 1.1;
}
.header-sub {
  font-size: 12px; color: rgba(255,255,255,0.70);
  font-weight: 600; margin-top: 3px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* Логотип — большой, справа */
.logo-wrap {
  flex-shrink: 0;
  width: 140px; height: 60px;
  display: flex; align-items: center; justify-content: flex-end;
}
.logo-wrap img {
  width: 100%; height: 100%;
  object-fit: contain;
  filter: drop-shadow(0 2px 8px rgba(0,0,0,0.4));
}

/* ══ ТАБЫ РЕЖИМА ══════════════════════════════════════════════ */
.mode-tabs {
  display: flex; gap: 8px;
}
.tab {
  flex: 1; padding: 10px 6px;
  border-radius: 12px; border: none;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(8px);
  color: rgba(255,255,255,0.75);
  font-family: 'Nunito', sans-serif;
  font-size: 12px; font-weight: 800;
  cursor: pointer; text-align: center;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
  border: 1.5px solid rgba(255,255,255,0.2);
}
.tab .tab-icon { font-size: 18px; }
.tab.active {
  background: white; color: var(--blue);
  box-shadow: 0 4px 16px rgba(0,0,0,0.15);
  transform: translateY(-2px);
  border-color: transparent;
}
.tab:active { transform: scale(0.93); }

/* ══ КОНТЕНТ ══════════════════════════════════════════════════ */
.content { padding: 20px 16px 100px; }

/* ══ МЕТКИ СЕКЦИЙ ═════════════════════════════════════════════ */
.section-label {
  font-size: 10px; font-weight: 800; color: var(--text3);
  letter-spacing: 1px; text-transform: uppercase;
  margin-bottom: 10px; padding-left: 2px;
}

/* ══ КУРСЫ ════════════════════════════════════════════════════ */
.courses-panel { margin-bottom: 18px; animation: fadeUp 0.4s ease both; }
.courses-row {
  display: flex; gap: 7px; margin-bottom: 16px;
  background: white; padding: 5px; border-radius: 16px;
  box-shadow: var(--sh);
}
.course-tab {
  flex: 1; padding: 9px 4px;
  border-radius: 12px; border: none;
  background: transparent;
  color: var(--text2); font-family: 'Nunito', sans-serif;
  font-size: 12px; font-weight: 800; cursor: pointer;
  transition: all 0.22s cubic-bezier(0.34,1.56,0.64,1);
  text-align: center;
}
.course-tab.active {
  background: linear-gradient(135deg, var(--blue), var(--blue2));
  color: white;
  box-shadow: 0 3px 12px rgba(21,101,192,0.35);
  transform: translateY(-1px);
}
.course-tab:active { transform: scale(0.93); }

/* ══ КНОПКИ ГРУПП ═════════════════════════════════════════════ */
.groups-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
  animation: fadeUp 0.3s ease both;
}
.group-btn {
  background: white; border: 2px solid var(--border);
  border-radius: 16px; padding: 14px 6px;
  display: flex; flex-direction: column; align-items: center; gap: 7px;
  cursor: pointer; transition: all 0.22s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow: var(--sh); font-family: 'Nunito', sans-serif;
  position: relative; overflow: hidden;
}
.group-btn::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(21,101,192,0.06), transparent);
  opacity: 0; transition: opacity 0.2s;
}
.group-btn:hover::before { opacity: 1; }
.group-btn.active {
  background: linear-gradient(135deg, var(--blue), var(--blue2));
  border-color: transparent;
  box-shadow: 0 6px 22px rgba(21,101,192,0.38);
  transform: translateY(-2px);
}
.group-btn:active { transform: scale(0.92); }
.group-btn-icon {
  width: 38px; height: 38px; border-radius: 12px;
  background: linear-gradient(135deg, #E3F0FF, #C5DEFF);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
  transition: background 0.2s;
}
.group-btn.active .group-btn-icon {
  background: rgba(255,255,255,0.2);
}
.group-btn-name {
  font-size: 12px; font-weight: 900; color: var(--text);
  text-align: center; letter-spacing: -0.2px; line-height: 1.2;
}
.group-btn.active .group-btn-name { color: white; }

/* ══ ПРЕПОДАВАТЕЛИ ════════════════════════════════════════════ */
.teachers-panel { margin-bottom: 18px; animation: fadeUp 0.4s ease both; }
.teachers-grid { display: flex; flex-direction: column; gap: 8px; }
.teacher-btn {
  background: white; border: 2px solid var(--border);
  border-radius: 14px; padding: 12px 14px;
  display: flex; align-items: center; gap: 12px;
  cursor: pointer; transition: all 0.2s;
  box-shadow: var(--sh); font-family: 'Nunito', sans-serif;
}
.teacher-btn.active {
  background: linear-gradient(135deg, var(--blue), var(--blue2));
  border-color: transparent;
  box-shadow: 0 4px 18px rgba(21,101,192,0.32);
}
.teacher-btn:active { transform: scale(0.98); }
.teacher-avatar {
  width: 38px; height: 38px; border-radius: 12px; flex-shrink: 0;
  background: linear-gradient(135deg, #E3F0FF, #C5DEFF);
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 900; color: var(--blue);
}
.teacher-btn.active .teacher-avatar {
  background: rgba(255,255,255,0.2); color: white;
}
.teacher-name {
  font-size: 14px; font-weight: 700; color: var(--text);
}
.teacher-btn.active .teacher-name { color: white; }

/* ══ АУДИТОРИИ ════════════════════════════════════════════════ */
.rooms-panel { margin-bottom: 18px; animation: fadeUp 0.4s ease both; }
.rooms-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 9px; }
.room-btn {
  background: white; border: 2px solid var(--border);
  border-radius: 14px; padding: 13px 6px;
  display: flex; flex-direction: column; align-items: center; gap: 5px;
  cursor: pointer; transition: all 0.22s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow: var(--sh); font-family: 'Nunito', sans-serif;
}
.room-btn.active {
  background: linear-gradient(135deg, var(--blue), var(--blue2));
  border-color: transparent;
  box-shadow: 0 5px 18px rgba(21,101,192,0.35);
  transform: translateY(-2px);
}
.room-btn:active { transform: scale(0.92); }
.room-btn-icon { font-size: 18px; }
.room-btn-name {
  font-size: 11px; font-weight: 900; color: var(--text);
  text-align: center; letter-spacing: -0.2px;
}
.room-btn.active .room-btn-name { color: white; }

/* ══ НАВИГАЦИЯ ПО ДАТАМ ═══════════════════════════════════════ */
.date-nav {
  display: flex; gap: 7px;
  margin-bottom: 20px; overflow-x: auto;
  scrollbar-width: none; -webkit-overflow-scrolling: touch;
  animation: fadeUp 0.45s ease both; padding-bottom: 4px;
}
.date-nav::-webkit-scrollbar { display: none; }
.date-chip {
  flex-shrink: 0; padding: 9px 16px;
  border-radius: 50px; font-size: 13px; font-weight: 800;
  cursor: pointer; transition: all 0.2s;
  background: white; color: var(--text2);
  border: 2px solid var(--border);
  box-shadow: var(--sh); white-space: nowrap;
}
.date-chip.active {
  background: linear-gradient(135deg, var(--blue), var(--blue2));
  color: white; border-color: transparent;
  box-shadow: 0 4px 16px rgba(21,101,192,0.35);
  transform: translateY(-1px);
}
.date-chip:active { transform: scale(0.94); }

/* ══ РАСПИСАНИЕ ═══════════════════════════════════════════════ */
.schedule-day { margin-bottom: 24px; animation: fadeUp 0.5s ease both; }
.day-header {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 12px; padding: 0 4px;
}
.day-date {
  font-family: 'Montserrat', sans-serif;
  font-size: 15px; font-weight: 800; color: var(--dark); letter-spacing: -0.3px;
}
.day-badge {
  padding: 4px 12px; border-radius: 50px;
  font-size: 10px; font-weight: 800; letter-spacing: 0.5px; text-transform: uppercase;
}
.badge-today { background: linear-gradient(135deg, var(--blue), var(--blue2)); color: white; box-shadow: 0 2px 8px rgba(21,101,192,0.3); }
.badge-tomorrow { background: rgba(21,101,192,0.10); color: var(--blue); border: 2px solid var(--blue2); }

.lessons-list { display: flex; flex-direction: column; gap: 10px; }

.lesson-card {
  background: white; border: 2px solid var(--border);
  border-radius: 18px; padding: 16px; position: relative;
  overflow: hidden; transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
  box-shadow: var(--sh);
}
.lesson-card::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 5px;
}
.lesson-card.future::before { background: linear-gradient(180deg, var(--blue), var(--blue3)); }
.lesson-card.ongoing {
  border-color: var(--blue2);
  background: linear-gradient(135deg, rgba(21,101,192,0.07) 0%, rgba(21,101,192,0.02) 50%, white 100%);
  box-shadow: 0 8px 28px rgba(21,101,192,0.22);
  transform: translateY(-2px);
}
.lesson-card.ongoing::before {
  background: linear-gradient(180deg, var(--blue), var(--blue2));
  box-shadow: 0 0 14px rgba(21,101,192,0.6);
  animation: pulseBar 2s ease-in-out infinite;
}
.lesson-card.past { opacity: 0.42; filter: grayscale(0.3); }
.lesson-card.past::before { background: linear-gradient(180deg, #B0BEC5, #90A4AE); }
.lesson-card:not(.past):hover {
  transform: translateY(-3px);
  box-shadow: 0 12px 32px rgba(21,101,192,0.15);
  border-color: var(--blue3);
}

@keyframes pulseBar {
  0%,100% { box-shadow: 0 0 14px rgba(21,101,192,0.6); }
  50% { box-shadow: 0 0 22px rgba(21,101,192,0.9); }
}

.lesson-header { display: flex; gap: 12px; }
.lesson-num {
  font-size: 12px; font-weight: 900; color: var(--blue);
  min-width: 20px; text-align: center; padding-top: 3px;
}
.lesson-time {
  display: flex; flex-direction: column; align-items: center;
  min-width: 52px; padding: 5px 8px;
  background: linear-gradient(135deg, #EEF4FB, #E3F0FF);
  border-radius: 10px; border: 1.5px solid var(--border);
}
.time-start { font-size: 15px; font-weight: 900; color: var(--text); font-variant-numeric: tabular-nums; }
.time-sep { font-size: 8px; color: var(--text3); margin: 1px 0; font-weight: 700; }
.time-end { font-size: 11px; font-weight: 700; color: var(--text2); font-variant-numeric: tabular-nums; }
.lesson-body { flex: 1; min-width: 0; }
.lesson-subject {
  font-size: 14px; font-weight: 800; line-height: 1.35;
  margin-bottom: 8px; color: var(--dark);
}
.lesson-meta { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 8px; }
.meta-chip {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 10px; border-radius: 8px;
  background: #EEF4FB; font-size: 12px; font-weight: 700;
  color: var(--text2); border: 1.5px solid var(--border);
}
.meta-icon { font-size: 13px; }

.ongoing-indicator {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 6px 12px; border-radius: 50px;
  background: linear-gradient(135deg, var(--blue), var(--blue2));
  color: white; font-size: 11px; font-weight: 800;
  letter-spacing: 0.5px; text-transform: uppercase;
  box-shadow: 0 4px 12px rgba(21,101,192,0.35);
  animation: glowPulse 2s ease-in-out infinite;
}
@keyframes glowPulse {
  0%,100% { box-shadow: 0 4px 12px rgba(21,101,192,0.35); }
  50% { box-shadow: 0 4px 20px rgba(21,101,192,0.6); }
}
.ongoing-dot {
  width: 7px; height: 7px; border-radius: 50%; background: white;
  animation: pulse 1.5s infinite;
}

/* ══ СОСТОЯНИЯ ════════════════════════════════════════════════ */
.empty-state { text-align: center; padding: 70px 20px; animation: fadeUp 0.5s ease both; }
.empty-icon { font-size: 60px; margin-bottom: 16px; }
.empty-title { font-family: 'Montserrat', sans-serif; font-size: 20px; font-weight: 800; margin-bottom: 10px; color: var(--dark); }
.empty-sub { font-size: 14px; color: var(--text2); line-height: 1.6; }

.loader { text-align: center; padding: 70px 20px; animation: fadeIn 0.3s ease both; }
.spinner {
  width: 44px; height: 44px; border: 4px solid var(--border);
  border-top-color: var(--blue2); border-radius: 50%;
  animation: spin 0.8s linear infinite; margin: 0 auto 18px;
}

/* ══ МОДАЛКА ══════════════════════════════════════════════════ */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(13,27,42,0.55);
  z-index: 200; display: none; align-items: flex-end; backdrop-filter: blur(6px);
}
.modal-overlay.open { display: flex; }
.modal {
  background: white; border-radius: 24px 24px 0 0;
  padding: 24px 20px 40px; width: 100%;
  box-shadow: 0 -4px 32px rgba(0,0,0,0.18);
  animation: slideUp 0.35s cubic-bezier(0.34,1.56,0.64,1) both;
}
.modal-handle { width: 40px; height: 4px; border-radius: 2px; background: var(--border); margin: 0 auto 24px; }
.modal-title { font-family: 'Montserrat', sans-serif; font-size: 19px; font-weight: 800; margin-bottom: 22px; color: var(--dark); }
.setting-row { margin-bottom: 16px; }
.setting-label { font-size: 11px; font-weight: 800; color: var(--text2); letter-spacing: 0.4px; text-transform: uppercase; margin-bottom: 7px; }
.setting-input {
  width: 100%; background: #EEF4FB; border: 2px solid var(--border);
  border-radius: 12px; padding: 13px 15px; color: var(--text);
  font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 600; outline: none;
  transition: border-color 0.2s;
}
.setting-input:focus { border-color: var(--blue2); box-shadow: 0 0 0 3px rgba(21,101,192,0.12); }
.save-btn {
  width: 100%; padding: 15px;
  background: linear-gradient(135deg, var(--blue), var(--blue2));
  border: none; border-radius: 14px; color: white;
  font-family: 'Montserrat', sans-serif; font-size: 15px; font-weight: 800;
  cursor: pointer; margin-top: 10px;
  box-shadow: 0 8px 24px rgba(21,101,192,0.35); transition: all 0.2s;
}
.save-btn:active { transform: scale(0.97); }

/* ══ TOAST ════════════════════════════════════════════════════ */
.toast {
  position: fixed; bottom: 88px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--dark); color: white; padding: 12px 22px;
  border-radius: 50px; font-size: 14px; font-weight: 700;
  z-index: 300; opacity: 0; transition: all 0.3s; white-space: nowrap;
  box-shadow: 0 8px 24px rgba(0,0,0,0.25);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ══ АНИМАЦИИ ═════════════════════════════════════════════════ */
@keyframes fadeUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
@keyframes slideUp { from { transform:translateY(100%); } to { transform:translateY(0); } }
@keyframes spin { to { transform:rotate(360deg); } }
@keyframes pulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:0.4; transform:scale(0.7); } }

/* ══ ПОСЛЕДНЕЕ ОБНОВЛЕНИЕ ═══════════════════════════════════ */
.update-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 12px; border-radius: 50px; margin-bottom: 16px;
  background: white; border: 1.5px solid var(--border);
  font-size: 11px; font-weight: 700; color: var(--text2);
  box-shadow: var(--sh); animation: fadeUp 0.4s ease both;
}
.update-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: #4CAF50; flex-shrink: 0;
  box-shadow: 0 0 6px rgba(76,175,80,0.6);
}
</style>
</head>
<body>

<!-- ШАПКА -->
<div class="header">
  <div class="header-inner">
    <div class="header-top">
      <div class="header-text">
        <div class="header-title">Расписание ЧРТ</div>
        <div class="header-sub" id="header-sub">Загрузка...</div>

<script>
// ─── TELEGRAM WEB APP ────────────────────────────────────────────────────────
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); tg.setHeaderColor('#1E90FF'); tg.setBackgroundColor('#F5F7FA'); }

const DAYS_RU   = ['Воскресенье','Понедельник','Вторник','Среда','Четверг','Пятница','Суббота'];
const MONTHS_RU = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];

let state = {
  mode: 'student',
  selectedName: null,
  selectedCourse: 1,
  period: 'week',
  schedule: [],
  settings: JSON.parse(localStorage.getItem('chrt_settings') || '{}'),
};

let scheduleData = {};
let ALL_GROUPS   = [];  // [{ name, course }]
let ALL_TEACHERS = [];  // [{ name }]
let ALL_ROOMS    = [];  // [{ name, label }]  label = без "1-"

// ─── ЗАГРУЗКА ─────────────────────────────────────────────────────────────────
async function loadScheduleData() {
  try {
    const url = './schedule.json';
    const resp = await fetch(url);
    scheduleData = await resp.json();
  } catch (e) {
    console.error('Failed to load schedule.json:', e);
    scheduleData = {};
  }
  buildIndexes();
}

function buildIndexes() {
  // Группы — определяем курс по первой цифре числа в названии
  ALL_GROUPS = Object.keys(scheduleData).map(name => {
    const m = name.match(/(\d+)/);
    const course = m ? parseInt(m[1].charAt(0), 10) : 0;
    return { name, course };
  }).sort((a, b) => a.name.localeCompare(b.name, 'ru'));

  // Преподаватели
  const teacherSet = new Set();
  const roomSet    = new Set();
  Object.values(scheduleData).forEach(lessons => {
    lessons.forEach(l => {
      if ((l.teacherName || '').trim()) teacherSet.add(l.teacherName.trim());
      if ((l.roomName    || '').trim()) roomSet.add(l.roomName.trim());
    });
  });
  ALL_TEACHERS = [...teacherSet].sort((a, b) => a.localeCompare(b, 'ru'));
  const dbgCourses = [...new Set(ALL_GROUPS.map(g=>g.course))].sort((a,b)=>a-b);
  console.log('✅ Групп:', ALL_GROUPS.length, '| Курсы:', dbgCourses, '| Препод:', ALL_TEACHERS.length, '| Ауд:', roomSet.size);
  // Аудитории: label = убираем ведущий "1-" или "2-"
  ALL_ROOMS = [...roomSet]
    .sort((a, b) => a.localeCompare(b, 'ru'))
    .map(name => ({ name, label: name.replace(/^\d+-/, '') }));
}

// ─── РАСПИСАНИЕ ПО КРИТЕРИЮ ───────────────────────────────────────────────────
function getScheduleFor(mode, selectedName, dateFrom, dateTo) {
  const from = toDateStr(dateFrom);
  const to   = toDateStr(dateTo);
  const inRange = l => { const d = l.date || l.startTime.split('T')[0]; return d >= from && d <= to; };
  const result  = [];

  if (mode === 'student') {
    (scheduleData[selectedName] || []).forEach(l => {
      if (inRange(l) && l.subjectName) result.push(l);
    });
  } else if (mode === 'teacher') {
    Object.entries(scheduleData).forEach(([gName, lessons]) => {
      lessons.forEach(l => {
        if ((l.teacherName || '').trim() === selectedName && l.subjectName && inRange(l))
          result.push({ ...l, className: gName });
      });
    });
  } else {
    Object.entries(scheduleData).forEach(([gName, lessons]) => {
      lessons.forEach(l => {
        if ((l.roomName || '').trim() === selectedName && l.subjectName && inRange(l))
          result.push({ ...l, className: gName });
      });
    });
  }
  return result.sort((a, b) => a.startTime.localeCompare(b.startTime));
}

function toDateStr(d) { return d.toISOString().split('T')[0]; }

// ─── РЕЖИМЫ ──────────────────────────────────────────────────────────────────
function setMode(mode) {
  state.mode        = mode;
  state.selectedName = null;
  state.schedule    = [];

  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + mode).classList.add('active');

  document.getElementById('groups-panel').style.display   = mode === 'student' ? 'block' : 'none';
  document.getElementById('teachers-panel').style.display = mode === 'teacher' ? 'block' : 'none';
  document.getElementById('rooms-panel').style.display    = mode === 'room'    ? 'block' : 'none';

  if (mode === 'student') {
    renderGroupsPanel();
    // Автовыбор первой группы текущего курса
    const first = ALL_GROUPS.find(g => g.course === state.selectedCourse) || ALL_GROUPS[0];
    if (first) selectGroup(first.name);
  } else if (mode === 'teacher') {
    renderTeachersPanel();
    if (ALL_TEACHERS.length) selectItem('teacher', ALL_TEACHERS[0]);
  } else {
    renderRoomsPanel();
    if (ALL_ROOMS.length) selectItem('room', ALL_ROOMS[0].name);
  }
}

// ─── ПАНЕЛЬ ГРУПП (с курсами) ─────────────────────────────────────────────────
function renderGroupsPanel() {
  const panel = document.getElementById('groups-panel');
  const courses = [...new Set(ALL_GROUPS.map(g => g.course))].sort((a,b) => a - b);
  const filtered = ALL_GROUPS.filter(g => g.course === state.selectedCourse);

  const courseTabs = courses.map(c => `
    <button class="course-tab ${c === state.selectedCourse ? 'active' : ''}"
            onclick="selectCourse(${c})">${c} курс</button>`).join('');

  const groupBtns = filtered.map(g => `
    <button class="group-btn ${g.name === state.selectedName ? 'active' : ''}"
            onclick="selectGroup('${g.name.replace(/'/g, "\\'")}')">
      <span class="group-btn-icon">🎓</span>
      <span class="group-btn-name">${g.name}</span>
    </button>`).join('');

  panel.innerHTML = `
    <div class="courses-panel">
      <div class="panel-label">Курс</div>
      <div class="courses-row">${courseTabs}</div>
      <div class="panel-label">Группа</div>
      <div class="groups-grid">${groupBtns || '<div style="color:var(--text3);font-size:14px;padding:8px">Групп нет</div>'}</div>
    </div>`;
}

function selectCourse(course) {
  state.selectedCourse = course;
  renderGroupsPanel();
  // Автовыбор первой группы нового курса
  const first = ALL_GROUPS.find(g => g.course === course);
  if (first) selectGroup(first.name);
}

function selectGroup(name) {
  state.selectedName = name;
  document.getElementById('header-sub').textContent = `Группа ${name}`;
  renderGroupsPanel();
  loadSchedule();
}

// ─── ПАНЕЛЬ ПРЕПОДАВАТЕЛЕЙ ────────────────────────────────────────────────────
function renderTeachersPanel() {
  const panel = document.getElementById('teachers-panel');
  const btns = ALL_TEACHERS.map(t => `
    <button class="teacher-btn ${t === state.selectedName ? 'active' : ''}"
            onclick="selectItem('teacher', '${t.replace(/'/g, "\\'")}')">
      <div class="teacher-btn-icon">👤</div>
      <div class="teacher-btn-name">${t}</div>
    </button>`).join('');

  panel.innerHTML = `
    <div class="teachers-panel">
      <div class="panel-label">Преподаватель</div>
      <div class="teachers-grid">${btns}</div>
    </div>`;
}

// ─── ПАНЕЛЬ АУДИТОРИЙ ─────────────────────────────────────────────────────────
function renderRoomsPanel() {
  const panel = document.getElementById('rooms-panel');
  const btns = ALL_ROOMS.map(r => `
    <button class="room-btn ${r.name === state.selectedName ? 'active' : ''}"
            onclick="selectItem('room', '${r.name.replace(/'/g, "\\'")}')">
      <span class="room-btn-icon">🚪</span>
      <span class="room-btn-name">${r.label}</span>
    </button>`).join('');

  panel.innerHTML = `
    <div class="rooms-panel">
      <div class="panel-label">Аудитория</div>
      <div class="rooms-grid">${btns}</div>
    </div>`;
}

// ─── ВЫБОР (teacher / room) ───────────────────────────────────────────────────
function selectItem(mode, name) {
  state.selectedName = name;
  const label = { teacher: 'Препод.', room: 'Ауд.' };
  document.getElementById('header-sub').textContent = `${label[mode]} ${name}`;
  if (mode === 'teacher') renderTeachersPanel();
  else renderRoomsPanel();
  loadSchedule();
}

// ─── НАВИГАЦИЯ ПО ДАТАМ ───────────────────────────────────────────────────────
function renderDateNav() {
  const nav = document.getElementById('date-nav');
  const periods = [
    { key: 'today',    label: 'Сегодня' },
    { key: 'tomorrow', label: 'Завтра' },
    { key: 'week',     label: 'Эта неделя' },
    { key: 'next',     label: 'След. неделя' },
    { key: '2weeks',   label: '2 недели' },
  ];
  nav.innerHTML = periods.map(p => `
    <div class="date-chip ${state.period === p.key ? 'active' : ''}"
         onclick="setPeriod('${p.key}')">${p.label}</div>`).join('');
}

function setPeriod(period) {
  state.period = period;
  renderDateNav();
  if (state.selectedName) loadSchedule();
}

function getPeriodDates() {
  const today = new Date(); today.setHours(0,0,0,0);
  if (state.period === 'today')    return [today, today];
  if (state.period === 'tomorrow') { const t=new Date(today); t.setDate(t.getDate()+1); return [t,t]; }
  if (state.period === 'week') {
    const mon=new Date(today); const dow=today.getDay()===0?6:today.getDay()-1;
    mon.setDate(today.getDate()-dow); const sun=new Date(mon); sun.setDate(mon.getDate()+6); return [mon,sun];
  }
  if (state.period === 'next') {
    const mon=new Date(today); const dow=today.getDay()===0?6:today.getDay()-1;
    mon.setDate(today.getDate()-dow+7); const sun=new Date(mon); sun.setDate(mon.getDate()+6); return [mon,sun];
  }
  const end=new Date(today); end.setDate(today.getDate()+13); return [today,end];
}

// ─── ЗАГРУЗКА РАСПИСАНИЯ ─────────────────────────────────────────────────────
async function loadSchedule() {
  if (!state.selectedName) return;
  showLoader();
  const [dateFrom, dateTo] = getPeriodDates();
  await new Promise(r => setTimeout(r, 150));
  state.schedule = getScheduleFor(state.mode, state.selectedName, dateFrom, dateTo);
  renderSchedule(dateFrom, dateTo);
}

// ─── РЕНДЕР РАСПИСАНИЯ ────────────────────────────────────────────────────────
function renderSchedule() {
  const area = document.getElementById('schedule-area');
  if (!state.schedule.length) {
    area.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📭</div>
        <div class="empty-title">Занятий нет</div>
        <div class="empty-sub">В выбранный период расписание отсутствует</div>
      </div>`;
    return;
  }
  const now     = new Date();
  const grouped = groupByDate(state.schedule);
  const html    = [];

  for (const [dateStr, lessons] of Object.entries(grouped)) {
    const [y,m,d] = dateStr.split('-').map(Number);
    const dayDate  = new Date(y, m-1, d);
    const isToday    = isSameDay(dayDate, now);
    const isTomorrow = isSameDayOffset(dayDate, now, 1);
    const dayLabel   = `${DAYS_RU[dayDate.getDay()]}, ${dayDate.getDate()} ${MONTHS_RU[dayDate.getMonth()]}`;
    let badge = '';
    if (isToday)    badge = '<span class="day-badge badge-today">Сегодня</span>';
    if (isTomorrow) badge = '<span class="day-badge badge-tomorrow">Завтра</span>';

    const lessonsHtml = lessons.map(l => {
      const startStr = l.startTime.substring(11,16);
      const endStr   = l.endTime.substring(11,16);
      const [sh,sm]  = startStr.split(':').map(Number);
      const [eh,em]  = endStr.split(':').map(Number);
      const lStart   = new Date(y,m-1,d,sh,sm);
      const lEnd     = new Date(y,m-1,d,eh,em);
      let cls = now > lEnd ? 'past' : now >= lStart ? 'ongoing' : 'future';

      const ongoingInd = cls === 'ongoing'
        ? `<div class="ongoing-indicator"><span class="ongoing-dot"></span>Идёт сейчас</div>` : '';

      const meta = [];
      if (state.mode !== 'teacher' && l.teacherName) meta.push(`<div class="meta-chip"><span class="meta-icon">👤</span>${l.teacherName}</div>`);
      if (state.mode !== 'room'    && l.roomName)    meta.push(`<div class="meta-chip"><span class="meta-icon">🚪</span>${l.roomName}</div>`);
      if (state.mode !== 'student' && l.className)   meta.push(`<div class="meta-chip"><span class="meta-icon">👥</span>${l.className}</div>`);

      return `
        <div class="lesson-card ${cls}">
          <div class="lesson-header">
            <div class="lesson-num">${l.number}</div>
            <div class="lesson-time">
              <div class="time-start">${startStr}</div>
              <div class="time-sep">—</div>
              <div class="time-end">${endStr}</div>
            </div>
            <div class="lesson-body">
              <div class="lesson-subject">${l.subjectName}</div>
              ${ongoingInd}
              <div class="lesson-meta">${meta.join('')}</div>
            </div>
          </div>
        </div>`;
    }).join('');

    html.push(`
      <div class="schedule-day">
        <div class="day-header"><div class="day-date">${dayLabel}</div>${badge}</div>
        <div class="lessons-list">${lessonsHtml}</div>
      </div>`);
  }
  area.innerHTML = html.join('');
}

// ─── ВСПОМОГАТЕЛЬНЫЕ ─────────────────────────────────────────────────────────
function groupByDate(lessons) {
  const g = {};
  lessons.forEach(l => { const d = l.date||l.startTime.split('T')[0]; if(!g[d])g[d]=[]; g[d].push(l); });
  const s = {};
  Object.keys(g).sort().forEach(k => { s[k]=g[k].sort((a,b)=>a.startTime.localeCompare(b.startTime)); });
  return s;
}
function isSameDay(a,b) { return a.toDateString()===b.toDateString(); }
function isSameDayOffset(a,b,offset) { const c=new Date(b); c.setDate(c.getDate()+offset); return a.toDateString()===c.toDateString(); }
function showEmptyState() {
  document.getElementById('schedule-area').innerHTML = `
    <div class="empty-state"><div class="empty-icon">📚</div>
    <div class="empty-title">Выберите объект</div></div>`;
}
function showLoader() {
  document.getElementById('schedule-area').innerHTML = `
    <div class="loader"><div class="spinner"></div>
    <div style="color:var(--text2);font-size:15px;font-weight:600">Загружаем расписание...</div></div>`;
}

// ─── НАСТРОЙКИ ───────────────────────────────────────────────────────────────
function closeSettingsOnBg(e) {
  if (e.target===document.getElementById('modal-overlay'))
    document.getElementById('modal-overlay').classList.remove('open');
}
function saveSettings() {
  state.settings = {
    sgoUrl:   document.getElementById('set-url').value.trim(),
    schoolId: document.getElementById('set-school').value.trim(),
    login:    document.getElementById('set-login').value.trim(),
    password: document.getElementById('set-pass').value,
  };
  localStorage.setItem('chrt_settings', JSON.stringify(state.settings));
  document.getElementById('modal-overlay').classList.remove('open');
  showToast('✅ Настройки сохранены');
}
function showToast(msg, duration=2500) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), duration);
}

// ─── INIT ────────────────────────────────────────────────────────────────────
renderDateNav();
loadScheduleData().then(() => {
  setMode('student');
  renderUpdateBadge();
});

// ─── ИНДИКАТОР ОБНОВЛЕНИЯ ────────────────────────────────────────────────────
function renderUpdateBadge() {
  const wrap = document.getElementById('update-badge-wrap');
  if (!wrap) return;
  const saved = localStorage.getItem('schedule_updated');
  if (saved) {
    const d = new Date(saved);
    const str = d.toLocaleString('ru-RU', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
    wrap.innerHTML = `<div class="update-badge"><span class="update-dot"></span>Обновлено: ${str}</div>`;
  }
}

// Обновляем schedule.json каждые 45 минут если страница открыта
setInterval(async () => {
  try {
    const url = './schedule.json?t=' + Date.now();
    const resp = await fetch(url);
    const fresh = await resp.json();
    scheduleData = fresh;
    buildIndexes();
    localStorage.setItem('schedule_updated', new Date().toISOString());
    renderUpdateBadge();
    if (state.selectedName) loadSchedule();
    showToast('🔄 Расписание обновлено');
  } catch(e) { console.warn('Auto-refresh failed:', e); }
}, 45 * 60 * 1000);

// ─── SERVICE WORKER ───────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').then(reg => {
    console.log('SW registered:', reg.scope);
  }).catch(e => console.warn('SW error:', e));
}
